<script>
  document.addEventListener('DOMContentLoaded', function () {
    const filterBtns = document.querySelectorAll('.filter-btn');
    const postCards = document.querySelectorAll('.post-card');

    filterBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        // 모든 버튼에서 active 클래스 제거 후, 클릭한 버튼에만 active 추가
        filterBtns.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');

        // 클릭한 버튼의 카테고리 값 가져오기
        const targetCategory = btn.getAttribute('data-filter');

        // 카드 필터링
        postCards.forEach((card) => {
          const cardCategory = card.getAttribute('data-category');

          // '전체'를 누르거나, 카드의 카테고리가 타겟 카테고리와 일치하면 보여줌
          if (targetCategory === 'all' || targetCategory === cardCategory) {
            card.style.display = 'flex'; // 우리 카드는 기존에 flex 속성을 사용함
          } else {
            card.style.display = 'none'; // 조건에 안 맞으면 숨김
          }
        });
      });
    });
  });
</script>
