<footer
  class="site-footer"
  style="
    border-top: 1px solid #e8e8e8;
    padding: 50px 0;
    margin-top: 80px;
    background-color: #ffffff;
  "
>
  <div
    class="wrapper"
    style="display: flex; flex-direction: column; align-items: center; justify-content: center"
  >
    <div class="footer-logo" style="margin-bottom: 15px; display: flex; align-items: center">
      <img src="/assets/logo/logo.png" alt="로고" style="height: 50px; width: auto" />
    </div>

    <div class="footer-info" style="color: #999; font-size: 14px; font-weight: 500">
      &copy; {{ site.time | date: '%Y' }}
      <a
        href="https://github.com/unoung"
        target="_blank"
        rel="noopener noreferrer"
        style="color: rgb(60, 157, 0); text-decoration: underline"
        >unoung</a
      >
    </div>
  </div>
</footer>
